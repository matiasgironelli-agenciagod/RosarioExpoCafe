<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Soft cream circular background so it pops on dark/light browser tabs -->
  <circle cx="64" cy="64" r="60" fill="#fff0de" stroke="#204532" stroke-width="6" />
  <!-- Stylized Coffee Bean -->
  <g transform="translate(64,64) rotate(-30) translate(-64,-64)">
    <!-- Bean Body -->
    <ellipse cx="64" cy="64" rx="28" ry="42" fill="#865433" />
    <!-- Bean Center groove line -->
    <path d="M64 22 C56 40 72 58 64 76 C56 94 72 102 64 106" stroke="#fff0de" stroke-width="4" fill="none" stroke-linecap="round" />
  </g>
</svg>